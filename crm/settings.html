</head>

<header class="crm-header">

    <div class="logo">CENTRAL DE TRASPASOS <span style="font-size:0.75rem;color:rgba(255,255,255,0.5)">CRM</span></div>
    <nav class="crm-nav">
      <a href="dashboard.html" data-i18n="crm_dashboard">Dashboard</a>
      <a href="properties.html" data-i18n="crm_properties">Propiedades</a>
      <a href="leads.html" data-i18n="crm_leads">Leads</a>
      <a href="users.html" data-i18n="crm_users">Usuarios</a>
      <a href="settings.html" class="active" data-i18n="crm_settings">Ajustes</a>
      <div class="lang-switch">

        <button class="lang-btn" data-lang="en" onclick="setLang('en')"><img src="../img/flag-gb.svg" class="flag-icon" alt=""> EN</button>
      </div>
    </nav>
  </div>
</header>

<div class="crm-layout">
  <nav class="crm-sidebar">
    <div class="crm-sidebar-logo" id="sidebarLogo"><img src="../img/logo.svg" alt="Logo" id="sidebarLogoImg"></div>
    <a href="dashboard.html">📊 <span data-i18n="crm_dashboard">Dashboard</span></a>
    <a href="properties.html">🏪 <span data-i18n="crm_properties">Propiedades</span></a>
    <a href="leads.html">📩 <span data-i18n="crm_leads">Leads</span></a>
    <a href="users.html">👥 <span data-i18n="crm_users">Usuarios</span></a>
    <a href="settings.html" class="active">⚙️ <span data-i18n="crm_settings">Ajustes</span></a>
    <a href="#" onclick="handleLogout()" style="margin-top:auto;border-top:1px solid #e0e8e8;padding-top:16px">🚪 <span data-i18n="crm_logout">Cerrar sesión</span></a>
    <div style="padding:12px 24px;font-size:0.8rem;color:var(--text-light)" id="userInfo"></div>
  </nav>

  <main class="crm-content">
    <h2 style="margin-bottom:24px" data-i18n="settings_title">Ajustes del sitio</h2>

    <form class="settings-grid" onsubmit="saveSettings(event)">
      <div class="settings-section">
        <h3 data-i18n="settings_hero">SecciÃ³n Hero</h3>
        <div class="form-group">
          <label>TÃ­tulo (ES)</label>
          <input type="text" id="hero_title_es" class="setting-field">
        </div>
        <div class="form-group">
          <label>TÃ­tulo (EN)</label>
          <input type="text" id="hero_title_en" class="setting-field">
        </div>
        <div class="form-group">
          <label>SubtÃ­tulo (ES)</label>
          <textarea id="hero_subtitle_es" class="setting-field" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>SubtÃ­tulo (EN)</label>
          <textarea id="hero_subtitle_en" class="setting-field" rows="3"></textarea>
        </div>
      </div>

      <div class="settings-section">
        <h3 data-i18n="settings_about">Sobre nosotros</h3>
        <div class="form-group">
          <label>Texto (ES)</label>
          <textarea id="about_es" class="setting-field" rows="5"></textarea>
        </div>
        <div class="form-group">
          <label>Texto (EN)</label>
          <textarea id="about_en" class="setting-field" rows="5"></textarea>
        </div>
      </div>

      <div class="settings-section" style="grid-column:1/-1">
        <h3 data-i18n="settings_contact">Contacto</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
          <div class="form-group">
            <label data-i18n="crm_leads_phone">TelÃ©fono</label>
            <input type="text" id="contact_phone" class="setting-field">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="text" id="contact_email" class="setting-field">
          </div>
          <div class="form-group">
            <label>DirecciÃ³n (ES)</label>
            <input type="text" id="contact_address_es" class="setting-field">
          </div>
          <div class="form-group">
            <label>DirecciÃ³n (EN)</label>
            <input type="text" id="contact_address_en" class="setting-field">
          </div>
          <div class="form-group">
            <label>Logo texto</label>
            <input type="text" id="logo_text" class="setting-field">
          </div>
        </div>
      </div>

      <div class="settings-section" style="grid-column:1/-1">
        <h3 data-i18n="settings_images">ImÃ¡genes del sitio</h3>
        <div class="settings-image-grid">
          <div class="settings-image-box">
            <div class="preview" id="heroPreview"><span class="placeholder" data-i18n="settings_image_hero">Hero background</span></div>
            <input type="file" accept="image/*" style="display:none" id="heroInput" onchange="uploadSiteImage('hero', this)">
            <button type="button" class="btn btn-sm btn-upload" onclick="document.getElementById('heroInput').click()" data-i18n="settings_upload">Subir</button>
            <button type="button" class="btn btn-sm btn-remove" onclick="removeSiteImage('hero')" data-i18n="settings_remove">Eliminar</button>
          </div>
          <div class="settings-image-box">
            <div class="preview" id="logoPreview"><span class="placeholder" data-i18n="settings_image_logo">Logo</span></div>
            <input type="file" accept="image/*" style="display:none" id="logoInput" onchange="uploadSiteImage('logo', this)">
            <button type="button" class="btn btn-sm btn-upload" onclick="document.getElementById('logoInput').click()" data-i18n="settings_upload">Subir</button>
            <button type="button" class="btn btn-sm btn-remove" onclick="removeSiteImage('logo')" data-i18n="settings_remove">Eliminar</button>
          </div>
          <div class="settings-image-box">
            <div class="preview" id="aboutPreview"><span class="placeholder" data-i18n="settings_image_about">Sobre nosotros</span></div>
            <input type="file" accept="image/*" style="display:none" id="aboutInput" onchange="uploadSiteImage('about', this)">
            <button type="button" class="btn btn-sm btn-upload" onclick="document.getElementById('aboutInput').click()" data-i18n="settings_upload">Subir</button>
            <button type="button" class="btn btn-sm btn-remove" onclick="removeSiteImage('about')" data-i18n="settings_remove">Eliminar</button>
          </div>
        </div>
      </div>

      <div style="grid-column:1/-1;display:flex;gap:12px">
        <button type="submit" class="btn btn-secondary" data-i18n="settings_save">Guardar cambios</button>
      </div>
    </form>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="../js/translations.js"></script>
<script src="../js/data.js"></script>
<script>
const user = requireAdmin();
if (!user) throw new Error('redirect');

function handleLogout() { logout(); window.location.href = 'login.html'; }

async function loadSettings() {
  const sc = await getSiteContent();
  document.getElementById('userInfo').innerHTML = `<strong>${user.name}</strong><br><span class="role-badge admin">admin</span>`;

  const fields = ['hero_title_es','hero_title_en','hero_subtitle_es','hero_subtitle_en',
    'about_es','about_en','contact_phone','contact_email','contact_address_es',
    'contact_address_en','logo_text'];
  fields.forEach(f => {
    const el = document.getElementById(f);
    if (el) el.value = sc[f] || '';
  });

  ['hero','logo','about'].forEach(key => {
    const preview = document.getElementById(key + 'Preview');
    getSiteImage(key).then(data => {
      if (data) {
        preview.innerHTML = '<img src="' + data + '" alt="">';
      } else {
        preview.innerHTML = '<span class="placeholder">' + t('settings_image_' + key) + '</span>';
      }
    });
  });
}

async function uploadSiteImage(key, input) {
  if (!input.files || !input.files[0]) return;
  const data = await readFileAsDataURL(input.files[0]);
  await saveSiteImage(key, data);
  await loadSettings();
  showToast(t('settings_saved'));
}

async function removeSiteImage(key) {
  await deleteSiteImage(key);
  await loadSettings();
  showToast(t('settings_saved'));
}

async function saveSettings(e) {
  e.preventDefault();
  const sc = await getSiteContent();
  sc.hero_title_es = document.getElementById('hero_title_es').value;
  sc.hero_title_en = document.getElementById('hero_title_en').value;
  sc.hero_subtitle_es = document.getElementById('hero_subtitle_es').value;
  sc.hero_subtitle_en = document.getElementById('hero_subtitle_en').value;
  sc.about_es = document.getElementById('about_es').value;
  sc.about_en = document.getElementById('about_en').value;
  sc.contact_phone = document.getElementById('contact_phone').value;
  sc.contact_email = document.getElementById('contact_email').value;
  sc.contact_address_es = document.getElementById('contact_address_es').value;
  sc.contact_address_en = document.getElementById('contact_address_en').value;
  sc.logo_text = document.getElementById('logo_text').value;
  await saveSiteContent(sc);
  showToast(t('settings_saved'));
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show';
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

document.addEventListener('DOMContentLoaded', async () => { loadSidebarLogo(); await loadSettings(); });
document.addEventListener('langchange', loadSettings);
</script>
</body>
</html>
