<script>
const user = requireAuth();
if (!user) throw new Error('redirect');
const isAgent = user.role === 'agent';
let currentFilter = 'all';
let pendingImages = [];

function handleLogout() { logout(); window.location.href = 'login.html'; }

function populateTownSelect() {
  const sel = document.getElementById('propTown');
  sel.innerHTML = '';
  TOWNS.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
}

async function getFilteredProps() {
  let props = await getProperties();
  if (isAgent) props = props.filter(p => p.createdBy === user.username);
  if (currentFilter === 'published') props = props.filter(p => p.status === 'published');
  if (currentFilter === 'draft') props = props.filter(p => p.status === 'draft');
  return props;
}

async function setTab(filter) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.filter === filter));
  await renderTable();
}

async function renderTable() {
  const props = await getFilteredProps();
  const tbody = document.getElementById('propsBody');
  document.getElementById('userInfo').innerHTML = `<strong>${user.name}</strong><br><span class="role-badge ${user.role}">${user.role}</span>`;

  if (!props.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-light);padding:32px" data-i18n="crm_no_props">No hay propiedades aÃºn</td></tr>';
    applyTranslation(); return;
  }

  tbody.innerHTML = props.map(p => {
    const title = p['title_' + currentLang] || p['title_es'];
    const typeLabel = getTypeLabel(p.type, currentLang);
    const statusLabel = t('crm_props_' + p.status);
    const agentName = USERS.find(u => u.username === p.createdBy);
    const agentLabel = agentName ? agentName.name : p.createdBy;
    const thumb = p.images && p.images.length
      ? '<img class="table-img-thumb" src="' + (p.images.find(i=>i.featured)||p.images[0]).data + '" alt="">'
      : 'â€”';
    const canEdit = user.role === 'admin' || p.createdBy === user.username;
    return '<tr>' +
      '<td>' + thumb + '</td>' +
      '<td>' + title + '</td>' +
      '<td>' + p.town + '</td>' +
      '<td>' + typeLabel + '</td>' +
      '<td>' + formatPrice(p.price) + '</td>' +
      '<td>' + statusLabel + '</td>' +
      '<td>' + agentLabel + '</td>' +
      '<td class="actions">' +
      (canEdit ? '<button class="btn-sm btn-edit" onclick="editProp(' + p.id + ')">\u270F\uFE0F ' + t('edit') + '</button>' : '') +
      (canEdit ? '<button class="btn-sm btn-delete" onclick="deleteProp(' + p.id + ')">\uD83D\uDDD1\uFE0F ' + t('delete') + '</button>' : '') +
      (p.status === 'published' ? '<button class="btn-sm btn-post" onclick="preparePost(' + p.id + ')" title="Preparar post para redes">\uD83D\uDCE4 Post</button>' : '') +
      (p.status === 'published' ? '<button class="btn-sm btn-reel" onclick="prepareReel(' + p.id + ')" title="Generar reel v\u00EDdeo">\uD83C\uDFA5 Reel</button>' : '') +
      '</td></tr>';
  }).join('');
  applyTranslation();
}

function compressImage(dataUrl, maxW, maxH, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toBlob ? new Promise(r => canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result);
        reader.readAsDataURL(blob);
      }, 'image/jpeg', quality)) : dataUrl);
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function handleImageUpload(e) {
  const files = e.target.files;
  for (const file of files) {
    const raw = await readFileAsDataURL(file);
    const data = await compressImage(raw, 1200, 900, 0.82);
    pendingImages.push({ data, featured: pendingImages.length === 0 });
  }
  e.target.value = '';
  renderImagePreviews();
}

function renderImagePreviews() {
  const grid = document.getElementById('imagePreviewGrid');
  if (!pendingImages.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = pendingImages.map((img, i) =>
    '<div class="image-preview-item' + (img.featured ? ' featured' : '') + '">' +
    (img.featured ? '<div class="featured-tag">â­ ' + t('crm_form_image_featured') + '</div>' : '') +
    '<img src="' + img.data + '" alt="" onerror="this.alt=\'Imagen no disponible\'">' +
    '<div class="img-actions">' +
    (!img.featured ? '<button class="btn-feat" type="button" onclick="setFeatured(' + i + ')">â­ ' + t('crm_form_image_featured') + '</button>' : '') +
    '<button class="btn-del" type="button" onclick="removeImage(' + i + ')">ðŸ—‘ï¸</button>' +
    '</div></div>'
  ).join('');
}

function setFeatured(i) {
  pendingImages.forEach((img, idx) => img.featured = idx === i);
  renderImagePreviews();
}

function removeImage(i) {
  pendingImages.splice(i, 1);
  if (pendingImages.length > 0 && !pendingImages.some(img => img.featured)) pendingImages[0].featured = true;
  renderImagePreviews();
}

function openModal(prop) {
  document.getElementById('modalOverlay').classList.add('open');
  pendingImages = [];
  const title = document.getElementById('modalTitle');
  const form = document.getElementById('propForm');
  form.reset();
  document.getElementById('propFeatured').checked = false;
  document.getElementById('propId').value = '';

  if (prop) {
    title.textContent = t('crm_props_edit');
    document.getElementById('propId').value = prop.id;
    document.getElementById('propTitleEs').value = prop.title_es;
    document.getElementById('propTitleEn').value = prop.title_en || '';
    document.getElementById('propTown').value = prop.town;
    document.getElementById('propType').value = prop.type;
    document.getElementById('propPrice').value = prop.price;
    document.getElementById('propMeters').value = prop.meters || '';
    document.getElementById('propStatus').value = prop.status;
    document.getElementById('propDescEs').value = prop.desc_es;
    document.getElementById('propDescEn').value = prop.desc_en || '';
    document.getElementById('propFeatured').checked = prop.featured || false;
    pendingImages = (prop.images || []).map(img => ({ ...img }));
    renderImagePreviews();
  } else {
    title.textContent = t('crm_props_add');
    document.getElementById('propStatus').value = 'published';
  }
  applyTranslation();
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); pendingImages = []; }

async function saveProp(e) {
  e.preventDefault();
  const id = document.getElementById('propId').value;
  const obj = {
    title_es: document.getElementById('propTitleEs').value,
    title_en: document.getElementById('propTitleEn').value,
    town: document.getElementById('propTown').value,
    type: document.getElementById('propType').value,
    price: parseFloat(document.getElementById('propPrice').value),
    meters: parseInt(document.getElementById('propMeters').value) || undefined,
    status: document.getElementById('propStatus').value,
    desc_es: document.getElementById('propDescEs').value,
    desc_en: document.getElementById('propDescEn').value,
    featured: document.getElementById('propFeatured').checked,
    images: pendingImages.map(img => ({ data: img.data, featured: img.featured })),
  };
  if (id) {
    await updateProperty(parseInt(id), obj);
  } else {
    obj.createdBy = user.username;
    await addProperty(obj);
  }
  closeModal();
  await renderTable();
  showToast(t('crm_props_saved'));
}

async function editProp(id) {
  const props = await getProperties();
  const p = props.find(x => x.id === id);
  if (p && (user.role === 'admin' || p.createdBy === user.username)) openModal(p);
}

async function deleteProp(id) {
  if (!confirm(t('crm_props_confirm_delete'))) return;
  const props = await getProperties();
  const p = props.find(x => x.id === id);
  if (p && (user.role !== 'admin' && p.createdBy !== user.username)) return;
  await deleteProperty(id);
  await renderTable();
  showToast(t('crm_props_deleted'));
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

async function preparePost(id) {
  const props = await getProperties();
  const p = props.find(x => x.id === id);
  if (!p) return showToast('Propiedad no encontrada', true);
  const title = p['title_' + currentLang] || p['title_es'];
  const price = formatPrice(p.price);
  const typeLabel = getTypeLabel(p.type, currentLang);

  const captionText = '\uD83C\uDFEA NUEVA PROPIEDAD\n' +
    '\uD83D\uDCCD ' + p.town + '\n' +
    '\uD83D\uDCB0 ' + price + ' (' + typeLabel + ')\n' +
    '\uD83D\uDCDD ' + title + '\n' +
    '\n' +
    '\u2B07\uFE0F \u00BFTe interesa? Escr\u00EDbenos:\n' +
    '\uD83D\uDCDE +34 645 412 519\n' +
    '\u2709\uFE0F info@centraldetraspasos.com\n' +
    '\uD83C\uDF10 centraldetraspasos.com\n' +
    '\n' +
    '#CENTRALDETRASPASOS #TraspasosM\u00E1laga #CostaDelSol #LocalesComerciales #' + p.town.replace(/ /g,'');

  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1350;
  const ctx = canvas.getContext('2d');

  const bgImg = p.images && p.images.length ? p.images.find(i=>i.featured) || p.images[0] : null;
  if (bgImg) {
    const img = new Image();
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = resolve;
      img.src = bgImg.data;
    });
    const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
    const x = (canvas.width - img.width * scale) / 2;
    const y = (canvas.height - img.height * scale) / 2;
    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    const grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,'#1A7A6A');
    grad.addColorStop(1,'#0F2B3D');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font = 'bold 120px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillText('\uD83C\uDFEA', canvas.width/2, canvas.height/2+40);
  }

  ctx.fillStyle = 'rgba(15,43,61,0.85)';
  const overlayY = canvas.height - 400;
  ctx.fillRect(0, overlayY, canvas.width, 400);
  ctx.fillStyle = 'rgba(212,175,55,0.15)';
  ctx.fillRect(0, overlayY, canvas.width, 4);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#D4AF37';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText('CENTRAL DE TRASPASOS', 50, overlayY + 50);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px sans-serif';
  const maxW = canvas.width - 100;
  let fontSize = 48;
  ctx.font = 'bold ' + fontSize + 'px sans-serif';
  while (ctx.measureText(title).width > maxW && fontSize > 24) {
    fontSize -= 2;
    ctx.font = 'bold ' + fontSize + 'px sans-serif';
  }
  ctx.fillText(title, 50, overlayY + 120);

  ctx.fillStyle = '#D4AF37';
  ctx.font = 'bold 42px sans-serif';
  ctx.fillText(price, 50, overlayY + 195);

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '28px sans-serif';
  ctx.fillText('\uD83D\uDCCD ' + p.town + ' \u00B7 ' + typeLabel, 50, overlayY + 260);

  ctx.fillStyle = '#D4AF37';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('\uD83D\uDCDE Cont\u00E1ctanos: +34 645 412 519', 50, overlayY + 325);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '22px sans-serif';
  ctx.fillText('\u2709\uFE0F info@centraldetraspasos.com  |  \uD83C\uDF10 centraldetraspasos.com', 50, overlayY + 365);

  const link = document.createElement('a');
  link.download = 'post-' + p.id + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();

  try {
    await navigator.clipboard.writeText(captionText);
    showToast('\u2705 Post descargado y texto copiado al portapapeles');
  } catch {
    showToast('\u2705 Post descargado');
  }
}

async function prepareReel(id) {
  const props = await getProperties();
  const p = props.find(x => x.id === id);
  if (!p) return showToast('Propiedad no encontrada', true);
  const title = p['title_' + currentLang] || p['title_es'];
  const price = formatPrice(p.price);
  const typeLabel = getTypeLabel(p.type, currentLang);
  const images = p.images && p.images.length ? p.images : null;
  if (!images) return showToast('La propiedad no tiene im\u00E1genes', true);

  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1920;
  const ctx = canvas.getContext('2d');
  const fps = 30;
  const secsPerImage = 3;
  const secsEnd = 3;
  const totalSecs = images.length * secsPerImage + secsEnd;
  const totalFrames = totalSecs * fps;

  const captionText = '\uD83C\uDFA5 NUEVA PROPIEDAD\n' +
    '\uD83D\uDCCD ' + p.town + '\n' +
    '\uD83D\uDCB0 ' + price + ' (' + typeLabel + ')\n' +
    '\uD83D\uDCDD ' + title + '\n' +
    '\n' +
    '\u2B07\uFE0F Cont\u00E1ctanos:\n' +
    '\uD83D\uDCDE +34 645 412 519\n' +
    '\u2709\uFE0F info@centraldetraspasos.com\n' +
    '\uD83C\uDF10 centraldetraspasos.com\n' +
    '\n' +
    '#CENTRALDETRASPASOS #TraspasosM\u00E1laga #CostaDelSol #LocalesComerciales #' + p.town.replace(/ /g,'');

  showToast('Cargando im\u00E1genes...');

  const loaded = await Promise.all(images.map(img => new Promise(resolve => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = () => resolve(i);
    i.src = img.data;
  })));

  const imageSecs = images.length * secsPerImage;
  const endFrame = imageSecs * fps;

  const stream = canvas.captureStream(fps);
  const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
  const chunks = [];

  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.download = 'reel-' + p.id + '.webm';
    a.href = url;
    a.click();
    URL.revokeObjectURL(url);
  };

  recorder.start();

  for (let f = 0; f < totalFrames; f++) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (f < endFrame) {
      const imgIdx = Math.floor(f / (secsPerImage * fps));
      const localFrame = f - imgIdx * secsPerImage * fps;
      const img = loaded[imgIdx];
      const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
      const progress = localFrame / (secsPerImage * fps);
      const zoom = 1 + progress * 0.1;
      const sw = canvas.width / (scale * zoom);
      const sh = canvas.height / (scale * zoom);
      const sx = (img.width - sw) / 2;
      const sy = (img.height - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else {
      const grad = ctx.createLinearGradient(0,0,0,canvas.height);
      grad.addColorStop(0,'#1A7A6A');
      grad.addColorStop(1,'#0F2B3D');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    ctx.textAlign = 'left';
    ctx.fillStyle = '#D4AF37';
    ctx.font = 'bold 32px sans-serif';
    ctx.fillText('CENTRAL DE TRASPASOS', 50, 100);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 52px sans-serif';
    const maxW = canvas.width - 100;
    let fs = 52;
    ctx.font = 'bold ' + fs + 'px sans-serif';
    while (ctx.measureText(title).width > maxW && fs > 26) { fs -= 2; ctx.font = 'bold ' + fs + 'px sans-serif'; }
    ctx.fillText(title, 50, 200);

    ctx.fillStyle = '#D4AF37';
    ctx.font = 'bold 46px sans-serif';
    ctx.fillText(price, 50, 290);

    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '30px sans-serif';
    ctx.fillText('\uD83D\uDCCD ' + p.town + ' \u00B7 ' + typeLabel, 50, 360);

    if (f >= endFrame) {
      ctx.fillStyle = '#D4AF37';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('\uD83D\uDCDE Cont\u00E1ctanos: +34 645 412 519', canvas.width/2, canvas.height/2 - 40);
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = '30px sans-serif';
      ctx.fillText('\u2709\uFE0F info@centraldetraspasos.com', canvas.width/2, canvas.height/2 + 40);
      ctx.fillText('\uD83C\uDF10 centraldetraspasos.com', canvas.width/2, canvas.height/2 + 90);
    }

    await new Promise(r => setTimeout(r, 1000/fps));
    if (f % fps === 0) {
      const pct = Math.round(f/totalFrames*100);
      document.getElementById('toast').textContent = 'Generando reel... ' + pct + '%';
      document.getElementById('toast').className = 'toast show';
    }
  }

  recorder.stop();
  setTimeout(() => { document.getElementById('toast').className = 'toast'; }, 1000);

  try {
    await navigator.clipboard.writeText(captionText);
  } catch {}

  showToast('\u2705 Reel descargado y texto copiado');
}

document.addEventListener('DOMContentLoaded', async () => {
  loadSidebarLogo();
  populateTownSelect();
  await renderTable();
});

document.addEventListener('langchange', async () => {
  const editing = document.getElementById('propId').value;
  document.getElementById('modalTitle').textContent = t(editing ? 'crm_props_edit' : 'crm_props_add');
  await renderTable();
});
</script>
</body>
