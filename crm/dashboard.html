<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CRM - Dashboard | CENTRAL DE TRASPASOS</title><meta name="robots" content="noindex, nofollow"><link rel="icon" type="image/svg+xml" href="../img/favicon.svg"><link rel="stylesheet" href="../css/style.css"></head><body class="crm-body"><header class="crm-header">  <div class="crm-header-inner">    <div class="logo">CENTRAL DE TRASPASOS <span style="font-size:0.75rem;color:rgba(255,255,255,0.5)">CRM</span></div>    <nav class="crm-nav">      <a href="dashboard.html" class="active" data-i18n="crm_dashboard">Dashboard</a>      <a href="properties.html" data-i18n="crm_properties">Propiedades</a>      <a href="leads.html" data-i18n="crm_leads">Leads</a>      <a href="propietarios.html">Propietarios</a>      <a href="users.html" data-i18n="crm_users">Usuarios</a>      <a href="settings.html" data-i18n="crm_settings">Ajustes</a>      <div class="lang-switch">        <button class="lang-btn" data-lang="es" onclick="setLang('es')"><img src="../img/flag-es.svg" class="flag-icon" alt=""> ES</button>        <button class="lang-btn" data-lang="en" onclick="setLang('en')"><img src="../img/flag-gb.svg" class="flag-icon" alt=""> EN</button>      </div>    </nav>  </div></header><div class="crm-layout">  <nav class="crm-sidebar">    <div class="crm-sidebar-logo" id="sidebarLogo"><img src="../img/logo.svg" alt="Logo" id="sidebarLogoImg"></div>    <a href="dashboard.html" class="active">?? <span data-i18n="crm_dashboard">Dashboard</span></a>    <a href="properties.html">?? <span data-i18n="crm_properties">Propiedades</span></a>    <a href="leads.html">?? <span data-i18n="crm_leads">Leads</span></a>    <a href="propietarios.html">?? Propietarios</a>    <a href="users.html">?? <span data-i18n="crm_users">Usuarios</span></a>    <a href="settings.html">?? <span data-i18n="crm_settings">Ajustes</span></a>    <a href="#" onclick="handleLogout()" style="margin-top:auto;border-top:1px solid #e0e8e8;padding-top:16px">?? <span data-i18n="crm_logout">Cerrar sesi¾n</span></a>    <div style="padding:12px 24px;font-size:0.8rem;color:var(--text-light)" id="userInfo"></div>  </nav>  <main class="crm-content">    <h2 style="margin-bottom:24px" data-i18n="crm_dashboard">Dashboard</h2>    <div class="stat-cards" id="statCards">      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label" data-i18n="crm_total_props">Total</div></div>      <div class="stat-card"><div class="num" id="statPublished">0</div><div class="label" data-i18n="crm_published">Publicadas</div></div>      <div class="stat-card"><div class="num" id="statSale">0</div><div class="label" data-i18n="crm_sale">En Venta</div></div>      <div class="stat-card"><div class="num" id="statLeads">0</div><div class="label" data-i18n="crm_leads_count">Leads</div></div>    </div>    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">      <div>        <h3 style="margin-bottom:16px" data-i18n="crm_recent_props">├Ültimas propiedades</h3>        <div id="recentProps"></div>      </div>      <div>        <h3 style="margin-bottom:16px" data-i18n="crm_recent_leads">├Ültimos leads</h3>        <div id="recentLeads"></div>      </div>    </div>  </main></div><script src="../js/translations.js"></script><script src="../js/data.js"></script><script>const user = requireAuth();if (!user) { throw new Error('redirect'); }function handleLogout() { logout(); window.location.href = 'login.html'; }async function renderDashboard() {  const props = await getProperties();  const leads = await getLeads();  const isAgent = user.role === 'agent';  const myProps = isAgent ? props.filter(p => p.createdBy === user.username) : props;  document.getElementById('statTotal').textContent = isAgent ? myProps.length : props.length;  document.getElementById('statPublished').textContent = (isAgent ? myProps : props).filter(p => p.status === 'published').length;  document.getElementById('statSale').textContent = (isAgent ? myProps : props).filter(p => p.type === 'sale').length;  document.getElementById('statLeads').textContent = leads.length;  document.getElementById('userInfo').innerHTML =    `<strong>${user.name}</strong><br><span class="role-badge ${user.role}">${user.role}</span>`;  const displayProps = isAgent ? myProps.slice(-3).reverse() : props.slice(-3).reverse();  const rp = document.getElementById('recentProps');  if (!displayProps.length) {    rp.innerHTML = '<p style="color:var(--text-light)" data-i18n="crm_no_props">No hay propiedades a├║n</p>';  } else {    rp.innerHTML = displayProps.map(p => {      const title = p['title_' + currentLang] || p['title_es'];      const statusLabel = t('crm_props_' + p.status);      return '<div style="background:white;padding:12px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">' +        '<div><strong>' + title + '</strong><br><span style="font-size:0.85rem;color:var(--text-light)">' + p.town + ' ┬Ę ' + statusLabel + '</span></div>' +        '<span style="font-weight:700;color:var(--secondary)">' + formatPrice(p.price) + '</span></div>';    }).join('');  }  const recentLeads = leads.slice(0, 5);  const rl = document.getElementById('recentLeads');  if (!recentLeads.length) {    rl.innerHTML = '<p style="color:var(--text-light)" data-i18n="crm_no_leads">No hay leads a├║n</p>';  } else {    rl.innerHTML = recentLeads.map(l => {      const badgeClass = l.status === 'new' ? 'badge-new' : l.status === 'contacted' ? 'badge-contacted' : 'badge-closed';      return '<div style="background:white;padding:12px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">' +        '<div><strong>' + l.name + '</strong><br><span style="font-size:0.85rem;color:var(--text-light)">' + l.email + '</span></div>' +        '<span class="badge ' + badgeClass + '">' + t('crm_leads_' + l.status) + '</span></div>';    }).join('');  }  applyTranslation();}document.addEventListener('DOMContentLoaded', () => { loadSidebarLogo(); renderDashboard(); });document.addEventListener('langchange', renderDashboard);</script></body></html>
