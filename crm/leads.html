<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM - Leads | CENTRAL DE TRASPASOS</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="crm-body">

<header class="crm-header">
  <div class="crm-header-inner">
    <div class="logo">CENTRAL DE TRASPASOS <span style="font-size:0.75rem;color:rgba(255,255,255,0.5)">CRM</span></div>
    <nav class="crm-nav">
      <a href="dashboard.html" data-i18n="crm_dashboard">Dashboard</a>
      <a href="properties.html" data-i18n="crm_properties">Propiedades</a>
      <a href="leads.html" class="active" data-i18n="crm_leads">Leads</a>
      <a href="propietarios.html">Propietarios</a>
      <a href="users.html" data-i18n="crm_users">Usuarios</a>
      <a href="settings.html" data-i18n="crm_settings">Ajustes</a>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="es" onclick="setLang('es')"><img src="../img/flag-es.svg" class="flag-icon" alt=""> ES</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')"><img src="../img/flag-gb.svg" class="flag-icon" alt=""> EN</button>
      </div>
    </nav>
  </div>
</header>

<div class="crm-layout">
  <nav class="crm-sidebar">
    <div class="crm-sidebar-logo" id="sidebarLogo"><img src="../img/logo.svg" alt="Logo" id="sidebarLogoImg"></div>
    <a href="dashboard.html">📊 <span data-i18n="crm_dashboard">Dashboard</span></a>
    <a href="properties.html">🏪 <span data-i18n="crm_properties">Propiedades</span></a>
    <a href="leads.html" class="active">📩 <span data-i18n="crm_leads">Leads</span></a>
    <a href="propietarios.html">👤 Propietarios</a>
    <a href="users.html">👥 <span data-i18n="crm_users">Usuarios</span></a>
    <a href="settings.html">⚙️ <span data-i18n="crm_settings">Ajustes</span></a>
    <a href="#" onclick="handleLogout()" style="margin-top:auto;border-top:1px solid #e0e8e8;padding-top:16px">🚪 <span data-i18n="crm_logout">Cerrar sesión</span></a>
    <div style="padding:12px 24px;font-size:0.8rem;color:var(--text-light)" id="userInfo"></div>
  </nav>

  <main class="crm-content">
    <h2 style="margin-bottom:24px" data-i18n="crm_leads_title">Bandeja de Leads</h2>

    <div class="lead-filters">
      <select id="filterStatus" onchange="renderLeads()">
        <option value="" data-i18n="crm_leads_all">Todos</option>
        <option value="new" data-i18n="crm_leads_new">Nuevo</option>
        <option value="contacted" data-i18n="crm_leads_contacted">Contactado</option>
        <option value="closed" data-i18n="crm_leads_closed">Cerrado</option>
      </select>
      <input type="text" id="leadSearch" data-i18n-placeholder="crm_leads_search" placeholder="Buscar lead..." oninput="renderLeads()">
    </div>

    <div id="leadsContainer"></div>
  </main>
</div>

<div class="modal-overlay" id="leadModal">
  <div class="modal" style="max-width:600px">
    <button class="close" onclick="closeLeadModal()">&times;</button>
    <h2 data-i18n="crm_leads_detail">Detalle del lead</h2>
    <div id="leadDetailContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/translations.js"></script>
<script src="../js/data.js"></script>
<script>
const user = requireAuth();
if (!user) throw new Error('redirect');
const isAdmin = user.role === 'admin';

function handleLogout() { logout(); window.location.href = 'login.html'; }

async function renderLeads() {
  const filterStatus = document.getElementById('filterStatus').value;
  const search = document.getElementById('leadSearch').value.toLowerCase();
  let leads = await getLeads();
  if (filterStatus) leads = leads.filter(l => l.status === filterStatus);
  if (search) leads = leads.filter(l =>
    l.name.toLowerCase().includes(search) ||
    l.email.toLowerCase().includes(search) ||
    (l.message && l.message.toLowerCase().includes(search))
  );
  const container = document.getElementById('leadsContainer');
  document.getElementById('userInfo').innerHTML = `<strong>${user.name}</strong><br><span class="role-badge ${user.role}">${user.role}</span>`;

  if (!leads.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">ðŸ“­</div><p data-i18n="crm_leads_no">No hay leads</p></div>';
    applyTranslation(); return;
  }

  container.innerHTML = leads.map(l => {
    const badgeClass = l.status === 'new' ? 'badge-new' : l.status === 'contacted' ? 'badge-contacted' : 'badge-closed';
    return '<div class="lead-card" onclick="openLeadDetail(' + l.id + ')">' +
      '<div class="info">' +
      '<div class="name">' + l.name + (l.notes ? ' ðŸ“' : '') + '</div>' +
      '<div class="detail">ðŸ“§ ' + l.email + (l.phone ? ' | ðŸ“ž ' + l.phone : '') + '</div>' +
      (l.propertyTitle ? '<div class="detail">ðŸª ' + l.propertyTitle + '</div>' : '') +
      '<div class="detail" style="margin-top:4px;font-size:0.8rem;color:#aaa">ðŸ“… ' + l.createdAt + '</div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">' +
      '<span class="badge ' + badgeClass + '">' + t('crm_leads_' + l.status) + '</span>' +
      '<div class="actions" onclick="event.stopPropagation()">' +
      (l.status !== 'contacted' ? '<button class="btn-sm btn-view" onclick="updateStatus(' + l.id + ',\'contacted\')">ðŸ“ž ' + t('crm_leads_contacted') + '</button>' : '') +
      (l.status !== 'closed' ? '<button class="btn-sm btn-edit" onclick="updateStatus(' + l.id + ',\'closed\')">âœ… ' + t('crm_leads_closed') + '</button>' : '') +
      (isAdmin ? '<button class="btn-sm btn-delete" onclick="deleteLead(' + l.id + ')">ðŸ—‘ï¸ ' + t('delete') + '</button>' : '') +
      '</div></div></div>';
  }).join('');
  applyTranslation();
}

async function openLeadDetail(id) {
  const leads = await getLeads();
  const l = leads.find(x => x.id === id);
  if (!l) return;
  const badgeClass = l.status === 'new' ? 'badge-new' : l.status === 'contacted' ? 'badge-contacted' : 'badge-closed';
  document.getElementById('leadDetailContent').innerHTML =
    '<div class="lead-detail-grid">' +
    '<div class="lead-detail-field"><label data-i18n="crm_leads_name">Nombre</label><div class="value">' + l.name + '</div></div>' +
    '<div class="lead-detail-field"><label data-i18n="crm_leads_email">Email</label><div class="value">' + l.email + '</div></div>' +
    '<div class="lead-detail-field"><label data-i18n="crm_leads_phone">TelÃ©fono</label><div class="value">' + (l.phone || 'â€”') + '</div></div>' +
    '<div class="lead-detail-field"><label data-i18n="crm_leads_status">Estado</label><div class="value"><span class="badge ' + badgeClass + '">' + t('crm_leads_' + l.status) + '</span></div></div>' +
    (l.propertyTitle ? '<div class="lead-detail-field" style="grid-column:1/-1"><label data-i18n="crm_leads_property">Propiedad</label><div class="value">' + l.propertyTitle + '</div></div>' : '') +
    '<div class="lead-detail-field" style="grid-column:1/-1"><label data-i18n="crm_leads_date">Fecha</label><div class="value">' + l.createdAt + '</div></div>' +
    '</div>' +
    '<div class="lead-detail-message">" ' + (l.message || 'â€”') + ' "</div>' +
    '<div style="margin-bottom:8px"><strong data-i18n="crm_leads_notes">Notas internas</strong></div>' +
    '<textarea class="lead-notes-textarea" id="leadNotes">' + (l.notes || '') + '</textarea>' +
    '<div class="form-actions" style="margin-top:12px">' +
    '<button class="btn btn-secondary" onclick="saveLeadNotes(' + l.id + ')" data-i18n="crm_leads_save_notes">Guardar notas</button>' +
    '</div>' +
    '<div class="form-actions" style="margin-top:8px">' +
    (l.status !== 'contacted' ? '<button class="btn-sm btn-view" onclick="updateStatus(' + l.id + ',\'contacted\');openLeadDetail(' + l.id + ')">ðŸ“ž ' + t('crm_leads_contacted') + '</button> ' : '') +
    (l.status !== 'closed' ? '<button class="btn-sm btn-edit" onclick="updateStatus(' + l.id + ',\'closed\');openLeadDetail(' + l.id + ')">âœ… ' + t('crm_leads_closed') + '</button> ' : '') +
    (isAdmin ? '<button class="btn-sm btn-delete" onclick="deleteLeadFromDetail(' + l.id + ')">ðŸ—‘ï¸ ' + t('crm_leads_delete') + '</button>' : '') +
    '</div>';
  document.getElementById('leadModal').classList.add('open');
  applyTranslation();
}

function closeLeadModal() { document.getElementById('leadModal').classList.remove('open'); }

async function saveLeadNotes(id) {
  const notes = document.getElementById('leadNotes').value;
  await updateLead(id, { notes });
  await renderLeads();
  showToast(t('crm_props_saved'));
}

async function updateStatus(id, status) {
  await updateLead(id, { status });
  await renderLeads();
  showToast(t('crm_props_saved'));
}

async function deleteLead(id) {
  if (!confirm(t('crm_leads_delete_confirm'))) return;
  await deleteLeadAPI(id);
  await renderLeads();
  showToast('Lead eliminado');
}

function deleteLeadFromDetail(id) {
  closeLeadModal();
  setTimeout(() => deleteLead(id), 300);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show';
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

document.addEventListener('DOMContentLoaded', () => { loadSidebarLogo(); renderLeads(); });
document.addEventListener('langchange', renderLeads);
</script>
</body>
</html>
