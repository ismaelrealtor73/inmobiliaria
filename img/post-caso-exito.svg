  <text x="540" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">Precio de venta:</text>
  <text x="540" y="475" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#4caf50">180.000 €</text>

  <text x="540" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">Tiempo en mercado:</text>

