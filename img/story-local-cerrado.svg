  <text x="540" y="1180" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#ffffff">¿Cuánto vale tu local hoy?</text>
  <text x="540" y="1225" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">Tasación gratis · Te lo decimos en 24h</text>
  <rect x="120" y="1310" width="840" height="120" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="540" y="1365" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">📞 +34 645 412 519</text>
  <text x="540" y="1405" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">📧 info@centraldetraspasos.com</text>
  <rect x="0" y="1912" width="1080" height="8" fill="#e8a838"/>
