<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2b3d"/>
      <stop offset="100%" style="stop-color:#1a4a6a"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#e8a838"/>

  <text x="540" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#e8a838" letter-spacing="3">CENTRAL DE TRASPASOS</text>
  <text x="540" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8ab4c8" letter-spacing="2">INMOBILIARIA · COSTA DEL SOL</text>

  <text x="540" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#ffffff">TORREMOLINOS</text>
  <line x1="390" y1="195" x2="690" y2="195" stroke="#e8a838" stroke-width="2"/>

  <rect x="60" y="230" width="960" height="200" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="540" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">📍 Zonas clave</text>
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• La Carihuela — chiringuitos, bares, hostelería puntera</text>
  <text x="100" y="340" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• Bajondillo — locales junto a playa, gran afluencia turística</text>
  <text x="100" y="370" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• Playamar — zona residencial con demanda de servicios</text>
  <text x="100" y="400" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• Centro — comercio local, bares de tapeo</text>

  <rect x="60" y="460" width="960" height="120" rx="12" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1"/>
  <text x="540" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4caf50">Rentabilidad media: 8,1% ⭐</text>
  <text x="540" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Precio medio local 80m²: 90.000€ – 180.000€</text>

  <text x="540" y="640" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffffff">FUENGIROLA</text>
  <line x1="420" y1="655" x2="660" y2="655" stroke="#e8a838" stroke-width="2"/>

  <rect x="60" y="680" width="960" height="200" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="540" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">📍 Zonas clave</text>
  <text x="100" y="760" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• Paseo Marítimo — restaurantes con terraza, locales premium</text>
  <text x="100" y="790" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• Los Boliches — comercio barrial, alta densidad de población</text>
  <text x="100" y="820" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• Centro ciudad — locales asequibles, demanda estable</text>
  <text x="100" y="850" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">• Zona Puerto — ocio nocturno y restauración</text>

  <rect x="60" y="910" width="960" height="120" rx="12" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1"/>
  <text x="540" y="955" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4caf50">Rentabilidad media: 7,8%</text>
  <text x="540" y="990" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Precio medio local 80m²: 100.000€ – 200.000€</text>

  <rect x="60" y="1080" width="960" height="150" rx="12" fill="#e8a838" opacity="0.12" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="540" y="1130" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8a838" font-weight="bold">💡 Oportunidad</text>
  <text x="540" y="1165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Torremolinos: la mejor rentabilidad de la provincia</text>
  <text x="540" y="1195" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Precios de entrada más bajos, demanda turística alta todo el año</text>

  <rect x="240" y="1260" width="600" height="60" rx="30" fill="#e8a838"/>
  <text x="540" y="1297" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f2b3d">TASACIÓN GRATUITA</text>

  <circle cx="460" cy="1330" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="500" cy="1330" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="540" cy="1330" r="8" fill="#e8a838"/>
  <circle cx="580" cy="1330" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="620" cy="1330" r="6" fill="#ffffff" opacity="0.3"/>
</svg>
