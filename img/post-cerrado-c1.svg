  <text x="540" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#e8a838">Sabemos lo que estás pensando:</text>
  <rect x="100" y="480" width="880" height="70" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="540" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">🤔 "El mercado está parado"</text>
  <text x="540" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">→ Realidad: NUNCA ha habido tanta demanda</text>
  <rect x="100" y="570" width="880" height="70" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="540" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">🤔 "Ya encontraré comprador"</text>
  <text x="540" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">→ Realidad: Cada mes pierdes ~1.250€ de ingresos</text>
  <rect x="100" y="660" width="880" height="70" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="540" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">🤔 "No sé cuánto vale"</text>
  <text x="540" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8ab4c8">→ Realidad: Te ayudamos a tasarlo GRATIS</text>
