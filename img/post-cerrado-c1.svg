  <text x="540" y="850" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e8a838">Hay solución</text>
  <text x="540" y="890" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Ponemos tu local frente a inversores reales</text>
  <text x="540" y="925" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">que están buscando en la Costa del Sol AHORA</text>
  <rect x="190" y="1080" width="700" height="70" rx="35" fill="#e8a838"/>
  <text x="540" y="1123" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0f2b3d">TASACIÓN GRATIS → DM</text>
  <circle cx="460" cy="1290" r="8" fill="#e8a838"/>
  <circle cx="500" cy="1290" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="540" cy="1290" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="580" cy="1290" r="6" fill="#ffffff" opacity="0.3"/>
