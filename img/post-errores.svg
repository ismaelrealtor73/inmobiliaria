<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2b3d"/>
      <stop offset="100%" style="stop-color:#1a4a6a"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#e8a838"/>

  <text x="540" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#e8a838" letter-spacing="3">CENTRAL DE TRASPASOS</text>
  <text x="540" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8ab4c8" letter-spacing="2">INMOBILIARIA · COSTA DEL SOL</text>

  <text x="540" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">3 ERRORES</text>
  <text x="540" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#e8a838">AL VENDER UN LOCAL</text>
  <line x1="290" y1="290" x2="790" y2="290" stroke="#e8a838" stroke-width="2" opacity="0.5"/>

  <!-- Error 1 -->
  <rect x="60" y="330" width="960" height="130" rx="16" fill="url(#card)" stroke="#ff5722" stroke-width="1.5"/>
  <text x="100" y="380" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff5722">1</text>
  <text x="150" y="380" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Poner un precio irreal</text>
  <text x="150" y="410" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">"Lo he tasado yo por mi cuenta"</text>
  <text x="150" y="435" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">→ El local se queda meses en el mercado sin visitas</text>
  <text x="150" y="455" font-family="Arial, sans-serif" font-size="16" fill="#e8a838">Solución: Tasación profesional realista</text>

  <!-- Error 2 -->
  <rect x="60" y="490" width="960" height="130" rx="16" fill="url(#card)" stroke="#ff5722" stroke-width="1.5"/>
  <text x="100" y="540" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff5722">2</text>
  <text x="150" y="540" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">No preparar el local</text>
  <text x="150" y="570" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">Local sucio, lleno de trastos, mala iluminación</text>
  <text x="150" y="595" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">→ Se vende hasta un 30% más lento</text>
  <text x="150" y="615" font-family="Arial, sans-serif" font-size="16" fill="#e8a838">Solución: Limpiar, vaciar y fotografía profesional</text>

  <!-- Error 3 -->
  <rect x="60" y="650" width="960" height="130" rx="16" fill="url(#card)" stroke="#ff5722" stroke-width="1.5"/>
  <text x="100" y="700" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff5722">3</text>
  <text x="150" y="700" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Publicar solo en 1 portal</text>
  <text x="150" y="730" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">Tu local debe estar donde miran los inversores</text>
  <text x="150" y="755" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">→ Menos visibilidad = menos ofertas</text>
  <text x="150" y="775" font-family="Arial, sans-serif" font-size="16" fill="#e8a838">Solución: Red de portales + inversores directos</text>

  <rect x="60" y="840" width="960" height="120" rx="12" fill="#e8a838" opacity="0.12" stroke="#e8a838" stroke-width="2"/>
  <text x="540" y="885" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#e8a838" font-weight="bold">🎯 Nosotros hacemos todo por ti</text>
  <text x="540" y="920" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#ffffff">Tasación · Fotos · Difusión · Negociación · Acompañamiento</text>

  <rect x="190" y="1020" width="700" height="65" rx="32" fill="#e8a838"/>
  <text x="540" y="1060" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f2b3d">EVITA ESTOS ERRORES → DM</text>

  <text x="540" y="1140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#8ab4c8">📞 +34 645 412 519 · 📧 info@centraldetraspasos.com</text>
</svg>
