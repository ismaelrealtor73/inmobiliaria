  <text x="540" y="1245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">📧 info@centraldetraspasos.com · 🌐 centraldetraspasos.com</text>

  <rect x="0" y="1342" width="1080" height="8" fill="#e8a838"/>
