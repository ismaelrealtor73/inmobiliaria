<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2b3d"/>
      <stop offset="100%" style="stop-color:#1a4a6a"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#e8a838"/>

  <text x="540" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#e8a838" letter-spacing="3">CENTRAL DE TRASPASOS</text>
  <text x="540" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8ab4c8" letter-spacing="2">INMOBILIARIA · COSTA DEL SOL</text>

  <text x="540" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">4 SEÑALES DE QUE</text>
  <text x="540" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#e8a838">TU LOCAL VALE MÁS</text>
  <text x="540" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#e8a838">DE LO QUE CREES</text>

  <line x1="290" y1="340" x2="790" y2="340" stroke="#e8a838" stroke-width="2" opacity="0.5"/>

  <!-- Señal 1 -->
  <rect x="60" y="380" width="960" height="80" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="100" y="425" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e8a838">1</text>
  <text x="150" y="425" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Llevas más de 6 meses sin inquilino</text>
  <text x="150" y="447" font-family="Arial, sans-serif" font-size="14" fill="#8ab4c8">El mercado ha cambiado, tu local también</text>

  <!-- Señal 2 -->
  <rect x="60" y="480" width="960" height="80" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="100" y="525" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e8a838">2</text>
  <text x="150" y="525" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">La zona ha mejorado</text>
  <text x="150" y="547" font-family="Arial, sans-serif" font-size="14" fill="#8ab4c8">Nuevo metro, peatonalización, nuevas obras cerca</text>

  <!-- Señal 3 -->
  <rect x="60" y="580" width="960" height="80" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="100" y="625" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e8a838">3</text>
  <text x="150" y="625" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Te llaman preguntando si lo vendes o traspasas</text>
  <text x="150" y="647" font-family="Arial, sans-serif" font-size="14" fill="#8ab4c8">Si preguntan, hay demanda. Aprovéchala</text>

  <!-- Señal 4 -->
  <rect x="60" y="680" width="960" height="80" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="100" y="725" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e8a838">4</text>
  <text x="150" y="725" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Tu negocio funciona pero necesitas más espacio</text>
  <text x="150" y="747" font-family="Arial, sans-serif" font-size="14" fill="#8ab4c8">Quizá no es que no valga, es que te has quedado pequeño</text>

  <rect x="60" y="820" width="960" height="180" rx="12" fill="#e8a838" opacity="0.12" stroke="#e8a838" stroke-width="2"/>
  <text x="540" y="870" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#e8a838" font-weight="bold">Cualquier señal significa lo mismo:</text>
  <text x="540" y="910" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">Tu local vale más de lo que crees</text>
  <text x="540" y="945" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">Y podemos demostrártelo con una tasación profesional</text>

  <rect x="190" y="1060" width="700" height="65" rx="32" fill="#e8a838"/>
  <text x="540" y="1100" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f2b3d">TASACIÓN GRATUITA → DM</text>

  <text x="540" y="1170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8ab4c8">📞 +34 645 412 519 · 📧 info@centraldetraspasos.com</text>
</svg>
